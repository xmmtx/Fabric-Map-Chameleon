name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: "MC ${{ matrix.label }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── MC 1.20 ~ 1.20.4（旧网络 API）──
          - label: "1.20-1.20.4"
            minecraft_version: "1.20.4"
            yarn_mappings: "1.20.4+build.3"
            fabric_version: "0.96.11+1.20.4"
            java_version: 17

          # ── MC 1.20.5 ~ 26.2（新网络 API）──
          - label: "1.20.5-26.2"
            minecraft_version: "1.20.5"
            yarn_mappings: "1.20.5+build.1"
            fabric_version: "0.97.8+1.20.5"
            java_version: 21

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java_version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java_version }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          ./gradlew build --no-daemon \
            -Pminecraft_version=${{ matrix.minecraft_version }} \
            -Pyarn_mappings=${{ matrix.yarn_mappings }} \
            -Pfabric_version=${{ matrix.fabric_version }} \
            -Pjava_version=${{ matrix.java_version }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: map-chameleon-mc${{ matrix.label }}
          path: build/libs/*.jar
          if-no-files-found: error

  # ── 仅 tag(v*) 或手动触发时创建 GitHub Release ──
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: map-chameleon-*
          merge-multiple: false
          path: jars

      - name: Flatten & list jars
        run: |
          mkdir -p release
          find jars -name "*.jar" -exec cp {} release/ \;
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Map Chameleon ${{ github.ref_name }}"
          files: release/*.jar
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
